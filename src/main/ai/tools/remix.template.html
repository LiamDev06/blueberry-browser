<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: #faf9f7;
      }

      #blueberry-remix {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 96px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        color: #1a1a1a;
        line-height: 1.7;
        font-size: 18px;
      }

      #blueberry-remix h1 {
        font-size: 2rem;
        line-height: 1.2;
        margin: 0 0 0.5em;
      }

      #blueberry-remix h2 {
        font-size: 1.4rem;
        margin: 1.6em 0 0.4em;
      }

      #blueberry-remix h3 {
        font-size: 1.15rem;
        margin: 1.4em 0 0.3em;
      }

      #blueberry-remix p {
        margin: 0 0 1em;
      }

      #blueberry-remix ul,
      #blueberry-remix ol {
        margin: 0 0 1em;
        padding-left: 1.4em;
      }

      #blueberry-remix li {
        margin: 0.35em 0;
      }

      #blueberry-remix a {
        color: #6b4eff;
      }

      #blueberry-remix blockquote {
        margin: 1em 0;
        padding-left: 1em;
        border-left: 3px solid #e0ddff;
        color: #555;
      }

      #blueberry-remix .blueberry-remix-badge {
        display: inline-block;
        font-size: 13px;
        font-weight: 600;
        color: #6b4eff;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <main id="blueberry-remix">
      <div class="blueberry-remix-badge">✨ Remixed</div>
      {remix_content}
    </main>
  </body>
</html>
